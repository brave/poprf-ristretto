# cbindgen configuration for `poprf-ristretto-ffi`.
#
# Regenerate the header with:
#
#     cd poprf-ristretto-ffi
#     cbindgen --config cbindgen.toml --output include/poprf_ristretto_ffi.h
#
# Or from the workspace root:
#
#     make headers
#
# CI compares the regenerated header against the checked-in copy and fails
# the build on drift; see `make check-headers`.

language = "C"
cpp_compat = true
include_guard = "POPRF_RISTRETTO_FFI_H"
documentation = true
documentation_style = "doxy"
line_length = 100
tab_width = 4
style = "type"

# All types exported across the C ABI are opaque pointers; their layout is
# defined entirely by `poprf-ristretto` (a non-`repr(C)` crate) and MUST
# NOT be inspected from C. Forward declarations are emitted in
# `after_includes` (inside the include guard) so consumers can spell
# `SecretKey *` etc. without including any Rust-side layout.
header = "/* poprf-ristretto-ffi: C ABI for RFC 9497 POPRF / ristretto255-SHA512 */"

autogen_warning = "/* This file is @generated by cbindgen from poprf-ristretto-ffi/src/lib.rs. DO NOT EDIT. */"

after_includes = """

/* Forward declarations for opaque types. Layout is private to the Rust
 * implementation; consumers may only pass these pointers to functions
 * declared in this header. */
typedef struct SecretKey SecretKey;
typedef struct PublicKey PublicKey;
typedef struct BlindedElement BlindedElement;
typedef struct EvaluatedElement EvaluatedElement;
typedef struct Proof Proof;
typedef struct PoprfOutput PoprfOutput;
"""

[parse]
# Only parse this crate. The opaque types referenced from `poprf-ristretto`
# are forward-declared in `header` above; cbindgen does not need to see
# their Rust definitions because we never expose them by value.
parse_deps = false

[export]
# Functions only — the opaque type forward declarations are in `header`.
item_types = ["functions"]
