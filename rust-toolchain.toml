# Pinned toolchain for reproducible wasm artifacts. Honored by rustup when
# entering this workspace; CI sets `toolchain: "1.94.0"` explicitly in the
# wasm job to match. Other CI jobs (fmt/clippy/test) deliberately use
# `stable` and the declared MSRV.
[toolchain]
channel = "1.94.0"
components = ["rustfmt", "clippy"]
targets = ["wasm32-unknown-unknown"]
