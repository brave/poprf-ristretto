# wasm32 targets must NOT inherit any native-CPU rustflags from a parent
# workspace config. Explicitly enable reference-types so wasm-bindgen 0.2.100+
# can properly generate and export its externref table management functions
# (__externref_table_alloc / __externref_table_dealloc). Without this flag
# those symbols are dead-code eliminated and wasm-pack fails with:
#   error: failed to find the __wbindgen_externref_table_dealloc function
#
# The Makefile `wasm` recipe replaces this entry via
# CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUSTFLAGS to add --remap-path-prefix,
# and re-adds +reference-types there since the env var replaces rather
# than merges.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=+reference-types"]
