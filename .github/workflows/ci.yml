# CI for poprf-ristretto.
#
# All gates also exist as Makefile targets (`make check-fmt`, `make clippy`,
# `make check-headers`, `make test`, `make wasm`, `make publish-dry-run`) so
# the local-developer and CI gate are bit-identical. Adding or tightening a
# gate means editing the Makefile; this workflow only orchestrates.
#
# Actions are pinned by commit SHA with a version comment per supply-chain
# best practice. Bumping any pin is a separate PR so the diff is reviewable.

name: CI

on:
  push:
  pull_request:

# Cancel in-flight runs on the same ref when a new commit lands. The CI
# matrix is fast enough that re-running on every push is cheap; running
# stale jobs on superseded commits is just noise.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Keep CI logs noise-free. `make clippy` already applies `-D warnings`
  # to workspace code; a global RUSTFLAGS=-D warnings would also affect
  # dependency compilation and cause unrelated dep-emitted deprecation
  # warnings to break CI.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04
        with:
          toolchain: stable
          components: rustfmt
      - run: make check-fmt

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: make clippy

  # cbindgen drift gate. Regenerates the FFI C header into a tempfile and
  # diffs against the checked-in copy. Catches every drift case: signature
  # change, new fn, renamed parameter, edited doc comment. The header lives
  # at poprf-ristretto-ffi/include/poprf_ristretto_ffi.h and ships in the
  # published tarball, so staleness is a real release-correctness bug.
  check-headers:
    name: cbindgen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: cbindgen
      - run: make check-headers

  test:
    name: test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `stable`: catches regressions against the current ecosystem.
        # `1.85`: enforces the MSRV declared in the workspace Cargo.toml.
        # Anything broken on 1.85 means rust-version in Cargo.toml is lying.
        # 1.85 is the edition-2024 floor (released 2025-02-20).
        toolchain: [stable, "1.85"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.toolchain }}
      - run: make test

  # End-to-end wasm build via the pinned container (see Dockerfile).
  wasm:
    name: wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: make wasm-docker WASM_DOCKER_TARGETS="wasm-tarball wasm-nodejs wasm-test"

  # Catches packaging regressions before any tag/publish: missing tracked
  # files (e.g. .gitignore over-restriction excluding a fixture), missing
  # metadata, dirty Cargo.toml state, and path-dep version mismatches.
  # Runs the same logic that would block a real `cargo publish`.
  package:
    name: cargo package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: make publish-dry-run

  # RUSTSEC advisory scan. Separate from the rest because a new advisory
  # can fail this job without any code change in the repo; treat as an
  # informational signal that a dep needs a bump, not a code-review block.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write 
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
